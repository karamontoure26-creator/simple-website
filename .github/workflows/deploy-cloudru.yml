name: Deploy to Cloud.ru

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CLOUD_RU_REGISTRY }}
          username: ${{ secrets.CLOUD_RU_USERNAME }}
          password: ${{ secrets.CLOUD_RU_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.CLOUD_RU_REGISTRY }}/simple-website:latest
          platforms: linux/amd64
